services:
  backend:
    build:
      context: ./architecture-engine
    image: architecture-engine
    container_name: architecture-backend
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./architecture-frontend
    image: aws-react-ui
    container_name: architecture-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend